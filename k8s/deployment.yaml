apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel_agency-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp-container
          image: 890iop/travel_agency:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
