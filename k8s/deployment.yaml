apiVersion: apps/v1
kind: Deployment
metadata:
  name: travel_agency-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: travel_agency
  template:
    metadata:
      labels:
        app: travel_agency
    spec:
      containers:
        - name: travel_agency-container
          image: 890iop/travel_agency:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
